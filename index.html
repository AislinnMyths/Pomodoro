<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
    <title>Pomodoro</title>
  </head>
  <body>
    <div id="pomodoroBox" class="workMode breakMode">
      <div id="timer">
        <div class="digit">
          <div class="card">
            <div class="top"><span>0</span></div>
            <div class="bottom"><span>0</span></div>
          </div>
        </div>

        <div class="digit">
          <div class="card">
            <div class="top"><span>0</span></div>
            <div class="bottom"><span>0</span></div>
          </div>
        </div>

        <span class="separator">:</span>

        <div class="digit">
          <div class="card">
            <div class="top"><span>0</span></div>
            <div class="bottom"><span>0</span></div>
          </div>
        </div>

        <div class="digit">
          <div class="card">
            <div class="top"><span>0</span></div>
            <div class="bottom"><span>0</span></div>
          </div>
        </div>
      </div>

      <div id="buttonBox">
        <button id="playPause" class="button play">▶/⏸</button>
        <button id="reset" class="button reset">Reset</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
