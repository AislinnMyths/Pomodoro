<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Pomodoro</title>
  </head>
  <body>
    <div id="pomodoroBox">
      <!--* ── Mode title (order: -1 in CSS pushes it above the timer) ── -->
      <p id="modeTitle">Pomodoro</p>

      <!--* ── Toast message ── -->
      <div id="toast"></div>

      <!--* ── Timer ── -->
      <div id="timer">
        <div class="digit">
          <div class="card static">
            <div class="top"><span>0</span></div>
            <div class="bottom"><span>0</span></div>
          </div>
          <div class="card flip-card">
            <div class="top"><span>0</span></div>
            <div class="bottom"><span>0</span></div>
          </div>
        </div>

        <div class="digit">
          <div class="card static">
            <div class="top"><span>0</span></div>
            <div class="bottom"><span>0</span></div>
          </div>
          <div class="card flip-card">
            <div class="top"><span>0</span></div>
            <div class="bottom"><span>0</span></div>
          </div>
        </div>

        <span class="separator">:</span>

        <div class="digit">
          <div class="card static">
            <div class="top"><span>0</span></div>
            <div class="bottom"><span>0</span></div>
          </div>
          <div class="card flip-card">
            <div class="top"><span>0</span></div>
            <div class="bottom"><span>0</span></div>
          </div>
        </div>

        <div class="digit">
          <div class="card static">
            <div class="top"><span>0</span></div>
            <div class="bottom"><span>0</span></div>
          </div>
          <div class="card flip-card">
            <div class="top"><span>0</span></div>
            <div class="bottom"><span>0</span></div>
          </div>
        </div>
      </div>

      <!--* ── Progress bar ── -->
      <div id="progressBar">
        <div id="progressFill"></div>
      </div>

      <!--* ── Counters: current round cycles + total completed rounds ── -->
      <div id="counters">
        <span id="cycleCount">0 / 4</span>
        <span id="roundCount">Completed rounds: 0</span>
      </div>

      <!--* ── Buttons ── -->
      <div id="buttonBox">
        <button id="playPause" class="button play">
          <span class="iconPlay">▶</span>
        </button>
        <button id="reset" class="button reset">Reset</button>
        <button id="settingsBtn" class="button settings">⚙</button>
      </div>

      <!--* ── Settings panel ── -->
      <div id="settingsPanel">
        <div class="settings-row">
          <label for="inputWork">Work (min)</label>
          <input id="inputWork" type="number" min="1" max="60" />
        </div>
        <div class="settings-row">
          <label for="inputShortBreak">Short break (min)</label>
          <input id="inputShortBreak" type="number" min="1" max="60" />
        </div>
        <div class="settings-row">
          <label for="inputLongBreak">Long break (min)</label>
          <input id="inputLongBreak" type="number" min="1" max="60" />
        </div>
        <div class="settings-row">
          <label for="inputPomodoros">Pomodoros before long break</label>
          <input id="inputPomodoros" type="number" min="1" max="8" />
        </div>
        <button id="saveSettings" class="button save">Save</button>
      </div>

      <!--* ── End-of-round modal ── -->
      <div id="modalOverlay">
        <div id="modal">
          <p id="modalMessage">Round complete! Ready for another one?</p>
          <div id="modalButtons">
            <button id="modalContinue" class="button modal-btn">
              Continue
            </button>
            <button id="modalStop" class="button modal-btn">Stop</button>
          </div>
        </div>
      </div>

      <!--* ── Tasks ── -->
      <div id="taskSection">
        <div id="taskDivider"></div>
        <div id="taskInputRow">
          <input
            id="taskInput"
            type="text"
            placeholder="Add a task..."
            maxlength="80"
          />
          <button id="addTaskBtn" class="button add-task">+</button>
        </div>
        <ul id="taskList"></ul>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
